<head>

    <script>
        tailwind.config = {

    <style>

        }

    <script>
        window.bigBiteApp = function() {
            return {
                selectedCategory: 'todas',
                searchTerm: '',
                cart: [],
                isCartOpen: false,
                currentStep: 'cart', // 'cart' o 'checkout'
                errorMessage: '',
                floatingNotification: '',
                isLoadingMenu: true,
                
                // Configuración de Horario Activo y Estado Abierto/Cerrado
                activeSchedule: 'SD', // Por defecto Sábados y Domingos
                isOpen: false,

                // Detalle del Producto Ampliado
                isDetailOpen: false,
                selectedProductForDetail: null,
                
                // Formulario de Checkout
                checkoutName: '',
                checkoutPhone: '',
                checkoutDeliveryType: 'delivery',
                checkoutAddress: '',
                checkoutReference: '',
                checkoutNotes: '',
                gpsCoords: '',
                
                // Sistema de Cotización por Distancia GPS
                deliveryDistance: 0,
                deliveryCost: 0,
                isOutOfRange: false,
                restaurantCoords: { lat: -5.16908597946167, lng: -80.6329345703125 }, // Santa María del Pinar

                // Sistema de guardado de datos (LocalStorage)
                saveUserData: false,
                
                // Leaflet Map State
                map: null,
                marker: null,

                // Logo dinámico inicial / fallback
                logoUrl: 'https://i.ibb.co/rRx2TLdW/IMG-3702-JPG.jpg',

                categories: [
                    { id: 'hamburguesas', name: '🍔 Hamburguesas' },
                    { id: 'salchipapas', name: '🍟 Salchipapas' },
                    { id: 'bebidas', name: '🥤 Bebidas' },
                    { id: 'cremas', name: '🍯 Cremas' },
                    { id: 'extras', name: '🥚 Extras' }
                ],

                // Lista fallback por si la red falla temporalmente
                products: [
                    { 
                        id: 'peque', 
                        name: 'Hamburguesa Peque', 
                        description: '160gr de pura carne artesanal, Pan brioche premium tostado en mantequilla, lechuga fresca y queso cheddar fundido.', 
                        category: 'hamburguesas', 
                        price: 15.0,
                        image: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=500&q=80'
                    },
                    { 
                        id: 'porcina', 
                        name: 'Hamburguesa Porcina', 
                        description: '160gr de pura carne artesanal, Pan brioche premium tostado en mantequilla, lechuga fresca, queso cheddar, bacon jam de la casa con cebolla caramelizada y tocino crujiente.', 
                        category: 'hamburguesas', 
                        price: 18.0,
                        image: 'https://images.unsplash.com/photo-1553979459-d2229ba7433b?auto=format&fit=crop&w=500&q=80'
                    },
                    { 
                        id: 'salchipapa-brutal', 
                        name: 'Salchipapa Brutal', 
                        description: 'Papas fritas amarillas de Piura súper crocantes, salchicha ahumada de primera calidad, todas las cremas artesanales.', 
                        category: 'salchipapas', 
                        price: 18.0,
                        image: 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&w=500&q=80'
                    },
                    { 
                        id: 'chicha-morada', 
                        name: 'Chicha Morada de la Casa', 
                        description: 'Chicha de maíz morado natural hervida con canela, clavo y un toque de limón de Piura.', 
                        category: 'bebidas', 
                        price: 6.0,
                        image: 'https://images.unsplash.com/photo-1497534446932-c925b458314e?auto=format&fit=crop&w=500&q=80'
                    },
                    { 
                        id: 'extra-papas', 
                        name: 'Porción de Papas Crocantes', 
                        description: 'Papas fritas amarillas ideales para acompañar tu hamburguesa.', 
                        category: 'extras', 
                        price: 8.0,
                        image: 'https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&w=500&q=80'
                    }
                ],

                initData() {
                    const savedData = localStorage.getItem('bigbite_saved_profile');
                    if (savedData) {
                        try {
                            const parsed = JSON.parse(savedData);
                            this.checkoutName = parsed.name || '';
                            this.checkoutPhone = parsed.phone || '';
                            this.checkoutDeliveryType = parsed.deliveryType || 'delivery';
                            this.checkoutAddress = parsed.address || '';
                            this.checkoutReference = parsed.reference || '';
                            this.saveUserData = true;
                        } catch (e) {
                            console.error("Error al cargar perfil guardado", e);
                        }
                    }
                    this.fetchMenu();
                    
                    // Comprobar estado abierto/cerrado cada 30 segundos
                    this.updateOpenStatus();
                    setInterval(() => {
                        this.updateOpenStatus();
                    }, 30000);
                },

                // CALCULAR EL ESTADO ABIERTO/CERRADO EN TIEMPO REAL (PIURA, PERÚ - GMT-5)
                updateOpenStatus() {
                    const now = new Date();
                    const peruString = now.toLocaleString("en-US", { timeZone: "America/Lima" });
                    const peruDate = new Date(peruString);
                    
                    const day = peruDate.getDay();
                    const hours = peruDate.getHours();
                    const minutes = peruDate.getMinutes();
                    const currentTimeInMinutes = hours * 60 + minutes;

                    const openingTime = 18 * 60 + 30; // 6:30 PM
                    const closingTime = 23 * 60;      // 11:00 PM

                    const isTimeValid = currentTimeInMinutes >= openingTime && currentTimeInMinutes < closingTime;

                    if (this.activeSchedule === 'VSD') {
                        const isDayValid = [0, 5, 6].includes(day);
                        this.isOpen = isDayValid && isTimeValid;
                    } else {
                        const isDayValid = [0, 6].includes(day);
                        this.isOpen = isDayValid && isTimeValid;
                    }
                },

                // CÁLCULO DE DISTANCIA MATEMÁTICA (FÓRMULA DE HAVERSINE)
                calculateDistance(lat1, lon1, lat2, lon2) {
                    const R = 6371;
                    const dLat = (lat2 - lat1) * Math.PI / 180;
                    const dLon = (lon2 - lon1) * Math.PI / 180;
                    const a = 
                        Math.sin(dLat/2) * Math.sin(dLat/2) +
                        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    return R * c;
                },

                // ACTUALIZAR DISTANCIA Y COTIZACIÓN DE DELIVERY
                onMarkerMove(lat, lng) {
                    this.gpsCoords = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
                    
                    const dist = this.calculateDistance(
                        this.restaurantCoords.lat, 
                        this.restaurantCoords.lng, 
                        lat, 
                        lng
                    );
                    
                    this.deliveryDistance = dist;

                    if (dist < 1.0) {
                        this.deliveryCost = 3.0;
                        this.isOutOfRange = false;
                    } else if (dist >= 1.0 && dist <= 3.0) {
                        this.deliveryCost = 6.0;
                        this.isOutOfRange = false;
                    } else if (dist > 3.0 && dist <= 6.0) {
                        this.deliveryCost = 9.0;
                        this.isOutOfRange = false;
                    } else if (dist > 6.0 && dist <= 9.0) {
                        this.deliveryCost = 13.0;
                        this.isOutOfRange = false;
                    } else {
                        this.deliveryCost = 0;
                        this.isOutOfRange = true;
                    }
                },

                // OBTENER UBICACIÓN POR GPS NATIVO Y AUTOCOMPLETAR DIRECCIÓN
                getCurrentLocationGPS() {
                    if (!navigator.geolocation) {
                        this.triggerNotification("❌ Tu navegador no soporta geolocalización.");
                        return;
                    }
                    this.triggerNotification("⏳ Conectando con el GPS de tu celular...");
                    navigator.geolocation.getCurrentPosition(
                        async (position) => {
                            const lat = position.coords.latitude;
                            const lng = position.coords.longitude;
                            
                            if (this.map) {
                                this.map.setView([lat, lng], 16);
                            }
                            if (this.marker) {
                                this.marker.setLatLng([lat, lng]);
                            }
                            this.onMarkerMove(lat, lng);
                            this.triggerNotification("✅ GPS fijado correctamente.");

                            try {
                                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&addressdetails=1`, {
                                    headers: { 'Accept-Language': 'es' }
                                });
                                if (response.ok) {
                                    const data = await response.json();
                                    if (data && data.address) {
                                        const addr = data.address;
                                        const addressParts = [];
                                        if (addr.road) addressParts.push(addr.road);
                                        if (addr.suburb) addressParts.push(addr.suburb);
                                        if (addr.neighbourhood && !addr.suburb) addressParts.push(addr.neighbourhood);
                                        if (addr.city_district) addressParts.push(addr.city_district);
                                        
                                        this.checkoutAddress = addressParts.length > 0 
                                            ? addressParts.join(', ') 
                                            : data.display_name.split(',').slice(0, 3).join(',').trim();
                                    }
                                }
                            } catch (e) {
                                console.error("Error Nominatim:", e);
                            }
                        },
                        (error) => {
                            console.error(error);
                            this.triggerNotification("❌ No pudimos acceder a tu GPS. Activa tus permisos de ubicación.");
                        },
                        { enableHighAccuracy: true, timeout: 10000 }
                    );
                },

                // BUSCAR DIRECCIÓN ESCRITA MANUALMENTE Y MOVER EL MAPA
                async geocodeAddress() {
                    if (!this.checkoutAddress.trim()) {
                        this.triggerNotification("⚠️ Escribe una dirección para buscarla.");
                        return;
                    }
                    this.triggerNotification("⏳ Buscando dirección en el mapa...");
                    try {
                        const query = encodeURIComponent(`${this.checkoutAddress.trim()}, Piura, Peru`);
                        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}&limit=1`, {
                            headers: { 'Accept-Language': 'es' }
                        });
                        if (response.ok) {
                            const data = await response.json();
                            if (data && data.length > 0) {
                                const lat = parseFloat(data[0].lat);
                                const lng = parseFloat(data[0].lon);
                                
                                if (this.map) {
                                    this.map.setView([lat, lng], 16);
                                }
                                if (this.marker) {
                                    this.marker.setLatLng([lat, lng]);
                                }
                                this.onMarkerMove(lat, lng);
                                this.triggerNotification("🎯 Mapa fijado en tu dirección.");
                            } else {
                                this.triggerNotification("❌ No se encontró la dirección. Intenta arrastrar el pin manualmente.");
                            }
                        }
                    } catch (e) {
                        console.error(e);
                        this.triggerNotification("❌ Error al conectar con el servidor de mapas.");
                    }
                },

                // LECTOR DE GOOGLE SHEETS EN TIEMPO REAL
                async fetchMenu() {
                    this.isLoadingMenu = true;
                    try {
                        const sheetId = '1sYGmS70zfowy-NbJ91u7OIJcqhhA4_muLaiKIFecEiI';
                        const gid = '1102074303';
                        const url = `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=tsv&gid=${gid}`;
                        
                        const response = await fetch(url);
                        if (!response.ok) throw new Error("No se pudo conectar con el servidor de la carta.");
                        const text = await response.text();
                        
                        const lines = text.split(/\r?\n/);
                        if (lines.length < 2) return;
                        
                        const headers = lines[0].split('\t').map(h => h.trim().toLowerCase().replace(/["\r\n]/g, ''));
                        
                        const fetchedProducts = [];
                        let fetchedLogo = this.logoUrl;
                        
                        for (let i = 1; i < lines.length; i++) {
                            const line = lines[i].trim();
                            if (!line) continue;
                            
                            const cols = lines[i].split('\t').map(c => c.trim());
                            const item = {};
                            headers.forEach((header, index) => {
                                let val = cols[index] || '';
                                if (val.startsWith('"') && val.endsWith('"')) {
                                    val = val.slice(1, -1);
                                }
                                item[header] = val;
                            });
                            
                            if (item.id === 'horario' || (item.categoria === 'config' && item.nombre === 'Horario Activo')) {
                                if (item.estado) {
                                    const val = item.estado.toUpperCase().trim();
                                    if (val === 'VSD' || val === 'SD') {
                                        this.activeSchedule = val;
                                    }
                                }
                                continue;
                            }
                            
                            if (item.id === 'logo' || item.categoria === 'logo' || item.nombre?.toLowerCase().includes('logo')) {
                                if (item.imagen_url) {
                                    fetchedLogo = item.imagen_url;
                                }
                                continue;
                            }
                            
                            if (item.nombre && item.categoria && item.estado?.toLowerCase() === 'disponible') {
                                fetchedProducts.push({
                                    id: item.id || `prod-${i}`,
                                    name: item.nombre,
                                    description: item.descripcion || '',
                                    category: item.categoria.toLowerCase(),
                                    price: parseFloat(item.precio) || 0,
                                    image: item.imagen_url || 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=500&q=80'
                                });
                            }
                        }
                        
                        if (fetchedProducts.length > 0) {
                            this.products = fetchedProducts;
                        }
                        this.logoUrl = fetchedLogo;
                        this.updateOpenStatus();
                    } catch (error) {
                        console.error("Error cargando Google Sheets:", error);
                    } finally {
                        this.isLoadingMenu = false;
                    }
                },

                getFilteredProducts(categoryId) {
                    return this.products.filter(p => {
                        const matchesCategory = p.category === categoryId;
                        const matchesSearch = p.name.toLowerCase().includes(this.searchTerm.toLowerCase()) || 
                                              p.description.toLowerCase().includes(this.searchTerm.toLowerCase());
                        return matchesCategory && matchesSearch;
                    });
                },

                openProductDetail(product) {
                    this.selectedProductForDetail = product;
                    this.isDetailOpen = true;
                },

                shouldShowCategory(categoryId) {
                    return this.selectedCategory === 'todas' || this.selectedCategory === categoryId;
                },

                getProductsCountInCategory(categoryId) {
                    return this.products.filter(p => p.category === categoryId).length;
                },

                addToCartDirectly(product) {
                    const existingItem = this.cart.find(item => item.id === product.id);
                    if (existingItem) {
                        existingItem.quantity++;
                    } else {
                        this.cart.push({
                            id: product.id,
                            name: product.name,
                            price: product.price,
                            quantity: 1
                        });
                    }
                },

                increaseQty(item) {
                    item.quantity++;
                },

                decreaseQty(item) {
                    if (item.quantity > 1) {
                        item.quantity--;
                    } else {
                        this.removeItem(item);
                    }
                },

                removeItem(item) {
                    this.cart = this.cart.filter(i => i.id !== item.id);
                },

                getCartItemsCount() {
                    return this.cart.reduce((sum, item) => sum + item.quantity, 0);
                },

                getCartTotal() {
                    return this.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                },

                getCartTotalWithDelivery() {
                    const subtotal = this.getCartTotal();
                    const delivery = (this.checkoutDeliveryType === 'delivery' && !this.isOutOfRange) ? this.deliveryCost : 0;
                    return subtotal + delivery;
                },

                scrollToMenu(categoryId) {
                    this.selectedCategory = categoryId;
                    setTimeout(() => {
                        const el = document.getElementById(`sec-${categoryId}`);
                        if (el) {
                            window.scrollTo({
                                top: el.offsetTop - 120,
                                behavior: 'smooth'
                            });
                        }
                    }, 100);
                },

                goToCheckout() {
                    this.currentStep = 'checkout';
                    this.initMap();
                },

                initMap() {
                    if (this.map) {
                        setTimeout(() => {
                            this.map.invalidateSize();
                        }, 200);
                        return;
                    }

                    setTimeout(() => {
                        const defaultLat = -5.1764;
                        const defaultLng = -80.6406;

                        this.map = L.map('map').setView([defaultLat, defaultLng], 15);
                        
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                            attribution: '© OpenStreetMap'
                        }).addTo(this.map);

                        const pinIcon = L.divIcon({
                            html: `<i class="fa-solid fa-location-dot text-bb-red text-3xl drop-shadow-md"></i>`,
                            iconSize: [30, 30],
                            iconAnchor: [15, 30],
                            className: 'bg-transparent border-none'
                        });

                        this.marker = L.marker([defaultLat, defaultLng], { 
                            draggable: true,
                            icon: pinIcon
                        }).addTo(this.map);

                        this.onMarkerMove(defaultLat, defaultLng);

                        this.marker.on('dragend', () => {
                            const pos = this.marker.getLatLng();
                            this.onMarkerMove(pos.lat, pos.lng);
                        });

                        this.map.on('click', (e) => {
                            const pos = e.latlng;
                            this.marker.setLatLng(pos);
                            this.onMarkerMove(pos.lat, pos.lng);
                        });

                    }, 250);
                },

                copyToClipboard(text) {
                    const el = document.createElement('textarea');
                    el.value = text;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    this.triggerNotification("📞 ¡Número de Yape copiado!");
                },

                triggerNotification(msg) {
                    this.floatingNotification = msg;
                    setTimeout(() => {
                        if (this.floatingNotification === msg) {
                            this.floatingNotification = '';
                        }
                    }, 3500);
                },

                // 🚀 LANZADOR DE YAPE ANTICRASH (MÉTODO IFRAME INVISIBLE)
                openYapeApp() {
                    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                    const isAndroid = /Android/.test(navigator.userAgent);
                    
                    if (isAndroid) {
                        // En Android dentro de Instagram, usar un iframe evita la redirección rota y el error de "servidor"
                        const iframe = document.createElement("iframe");
                        iframe.style.display = "none";
                        iframe.src = "yape://";
                        document.body.appendChild(iframe);
                        
                        // Remover el iframe tras disparar el intento
                        setTimeout(() => {
                            document.body.removeChild(iframe);
                        }, 600);

                        this.triggerNotification("⚡ Intentando abrir Yape... Si no abre, copia el número.");
                    } else if (isIOS) {
                        // En iOS el window.location directo funciona bien si la app existe
                        const start = Date.now();
                        window.location.href = "yape://";
                        setTimeout(() => {
                            if (Date.now() - start < 1500) {
                                this.triggerNotification("📱 Copia el número y abre tu Yape manualmente.");
                            }
                        }, 1200);
                    } else {
                        this.triggerNotification("💻 Opción optimizada para celulares con Yape instalado.");
                    }
                },

                sendToWhatsApp() {
                    this.errorMessage = '';

                    if (!this.checkoutName.trim()) {
                        this.errorMessage = "Debes ingresar tu Nombre completo.";
                        return;
                    }
                    if (!this.checkoutPhone.trim() || this.checkoutPhone.length < 9) {
                        this.errorMessage = "Debes ingresar un número de Celular válido (9 dígitos).";
                        return;
                    }
                    if (this.checkoutDeliveryType === 'delivery') {
                        if (!this.checkoutAddress.trim()) {
                            this.errorMessage = "Por favor, ingresa tu dirección exacta.";
                            return;
                        }
                        if (this.isOutOfRange) {
                            this.errorMessage = "La ubicación elegida está fuera del rango de reparto (Límite: 9 km).";
                            return;
                        }
                    }

                    if (this.saveUserData) {
                        const profile = {
                            name: this.checkoutName.trim(),
                            phone: this.checkoutPhone.trim(),
                            deliveryType: this.checkoutDeliveryType,
                            address: this.checkoutAddress.trim(),
                            reference: this.checkoutReference.trim()
                        };
                        localStorage.setItem('bigbite_saved_profile', JSON.stringify(profile));
                    } else {
                        localStorage.removeItem('bigbite_saved_profile');
                    }

                    const businessPhone = "51940279127";
                    
                    let msg = `🍔 *NUEVO PEDIDO - BIG BITE* 🍔\n\n`;
                    msg += `👤 *Cliente:* ${this.checkoutName.trim()}\n`;
                    msg += `📞 *Celular:* ${this.checkoutPhone.trim()}\n`;
                    msg += `🛵 *Tipo de Entrega:* ${this.checkoutDeliveryType === 'delivery' ? 'Delivery' : 'Recojo en Local'}\n`;
                    
                    if (this.checkoutDeliveryType === 'delivery') {
                        msg += `📍 *Dirección:* ${this.checkoutAddress.trim()}\n`;
                        if (this.checkoutReference.trim()) {
                            msg += `🏢 *Referencia:* ${this.checkoutReference.trim()}\n`;
                        }
                        msg += `🗺️ *Ubicación GPS:* https://www.google.com/maps/search/?api=1&query=${this.gpsCoords.replace(/\s/g, '')}\n`;
                        msg += `📏 *Distancia:* ${this.deliveryDistance.toFixed(2)} km\n`;
                    } else {
                        msg += `🏢 *Punto de Recojo:* Santa María del Pinar Mz D lote 25, Av. Las Gardenias\n`;
                    }

                    if (this.checkoutNotes.trim()) {
                        msg += `📝 *Especificaciones:* ${this.checkoutNotes.trim()}\n`;
                    }
                    
                    msg += `💵 *Método de Pago:* Yape (Joaquin Sanchez)\n\n`;
                    msg += `📋 *PRODUCTOS PEDIDOS:* \n`;
                    
                    this.cart.forEach(item => {
                        msg += `• ${item.quantity}x _${item.name}_ | S/ ${(item.price * item.quantity).toFixed(2)}\n`;
                    });

                    const subtotal = this.getCartTotal();
                    const delivery = this.checkoutDeliveryType === 'delivery' ? this.deliveryCost : 0;
                    const total = subtotal + delivery;

                    msg += `\n📦 *Subtotal:* S/ ${subtotal.toFixed(2)}\n`;
                    if (this.checkoutDeliveryType === 'delivery') {
                        msg += `🚚 *Envío:* S/ ${delivery.toFixed(2)}\n`;
                    }
                    msg += `💰 *TOTAL GENERAL: S/ ${total.toFixed(2)}*\n\n`;
                    msg += `⚡ _Por favor indícame si el Yape ya fue enviado para iniciar la preparación._`;

                    const url = `https://api.whatsapp.com/send?phone=${businessPhone}&text=${encodeURIComponent(msg)}`;
